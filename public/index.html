<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DozoTime!</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #3B0A2A;
      color: #fff;
    }
    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 2rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      width: min(90vw, 400px);
    }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1.1rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #111;
      color: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #facc15; }
    input::placeholder { color: #555; }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #facc15;
      color: #000;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }
    #flash {
      position: fixed;
      top: 1.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #flash.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- Name prompt (shown on first visit) -->
  <div id="nameScreen" style="display:none;text-align:center;">
    <h1>DozoTime!</h1>
    <p style="color:#888;margin-bottom:1.5rem;">What's your first name?</p>
    <form id="nameForm" style="justify-content:center;">
      <input id="nameInput" type="text" placeholder="Your name" autocomplete="given-name" autofocus>
      <button type="submit">Go</button>
    </form>
  </div>

  <!-- Main app (shown after name is set) -->
  <div id="mainApp" style="display:none;text-align:center;">
    <h1>DozoTime!</h1>
    <button id="enableBtn" style="padding:0.75rem 1.5rem;font-size:1.1rem;font-weight:700;border:none;border-radius:8px;background:#facc15;color:#000;cursor:pointer;margin-bottom:1.5rem;display:none;">Enable Notifications</button>
    <form id="yoForm">
      <input id="location" type="text" placeholder="Pour" autocomplete="off" autofocus>
      <button type="submit">Send</button>
    </form>
    <div id="status"></div>
    <div id="flash"></div>
  </div>

  <script>
    // --- Access Key ---
    const params = new URLSearchParams(window.location.search);
    if (params.has('key')) {
      localStorage.setItem('access_key', params.get('key'));
      window.history.replaceState({}, '', '/');
    }
    const ACCESS_KEY = localStorage.getItem('access_key');

    if (!ACCESS_KEY) {
      document.body.innerHTML = '<h1 style="font-size:2rem;text-align:center;padding:2rem;">Access denied</h1>';
      throw new Error('No access key');
    }

    function authFetch(url, opts = {}) {
      opts.headers = { ...opts.headers, 'x-access-key': ACCESS_KEY };
      return fetch(url, opts);
    }

    // --- Name Screen ---
    let userName = localStorage.getItem('user_name');

    if (!userName) {
      document.getElementById('nameScreen').style.display = '';
      document.getElementById('nameForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;
        localStorage.setItem('user_name', name);
        userName = name;
        document.getElementById('nameScreen').style.display = 'none';
        startApp();
      });
    } else {
      startApp();
    }

    function startApp() {
    document.getElementById('mainApp').style.display = '';

    const $status = document.getElementById('status');
    const $flash = document.getElementById('flash');
    const $form = document.getElementById('yoForm');
    const $input = document.getElementById('location');

    function flash(msg) {
      $flash.textContent = msg;
      $flash.classList.add('show');
      setTimeout(() => $flash.classList.remove('show'), 1500);
    }

    // --- Service Worker & Push Subscription ---
    const $enableBtn = document.getElementById('enableBtn');

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
    }

    async function subscribeToPush() {
      const reg = await navigator.serviceWorker.ready;
      const { publicKey } = await authFetch('/api/vapid-public-key').then((r) => r.json());

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey),
      });
      await authFetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...sub, name: userName }),
      });

      $enableBtn.style.display = 'none';
      $status.textContent = 'Subscribed — you\'ll get notified.';
    }

    async function checkPush() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        $status.textContent = 'Push notifications not supported in this browser.';
        return;
      }

      await navigator.serviceWorker.register('/sw.js');
      const reg = await navigator.serviceWorker.ready;
      const existing = await reg.pushManager.getSubscription();

      if (existing) {
        $status.textContent = 'Subscribed — you\'ll get notified.';
      } else {
        $enableBtn.style.display = 'block';
        $status.textContent = 'Tap the button to enable notifications.';
      }
    }

    $enableBtn.addEventListener('click', () => {
      $enableBtn.disabled = true;
      subscribeToPush().catch((err) => {
        console.error(err);
        $status.textContent = `Error: ${err.name}: ${err.message}`;
        $enableBtn.disabled = false;
      });
    });

    checkPush();

    // --- Send DozoTime! ---
    $form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const location = $input.value.trim();
      if (!location) return;

      const btn = $form.querySelector('button');
      btn.disabled = true;

      try {
        const res = await authFetch('/api/yo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ location, name: userName }),
        });
        const data = await res.json();
        flash(`Sent to ${data.sent}`);
        $input.value = '';
      } catch (err) {
        flash('Failed');
      } finally {
        btn.disabled = false;
        $input.focus();
      }
    });
    } // end startApp
  </script>
</body>
</html>
